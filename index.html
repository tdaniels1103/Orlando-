<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Orlando Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sun: #FF6B35;
    --sky: #0099CC;
    --palm: #2ECC71;
    --night: #1A1A2E;
    --sand: #FFF8F0;
    --gold: #FFD166;
    --coral: #FF8A65;
    --white: #FFFFFF;
    --gray1: #F5F5F5;
    --gray2: #E0E0E0;
    --gray3: #9E9E9E;
    --gray4: #616161;
    --text: #1A1A2E;
    --card-shadow: 0 4px 20px rgba(0,0,0,0.10);
    --card-shadow-hover: 0 8px 32px rgba(0,0,0,0.16);
    --radius: 18px;
    --radius-sm: 10px;
    --nav-h: 68px;
    --header-h: 60px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    color: var(--text);
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
</style>
</head>
